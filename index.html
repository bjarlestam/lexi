<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Spanska – repetition</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="top-bar">
      <div class="top-bar__left">
        <span class="top-bar__mark" aria-hidden="true">ES</span>
        <div class="top-bar__titles">
          <p class="top-bar__hello">¡Hola!</p>
          <p class="top-bar__tagline">Spansk repetition</p>
        </div>
      </div>
      <div
        class="top-bar__badge top-bar__badge--points"
        id="header-points-badge"
        title="Samlade poäng"
        aria-live="polite"
        aria-label="Poäng"
      >
        0
      </div>
    </header>

    <section class="dashboard" id="dashboard-zone" hidden>
      <article class="cta-card" aria-labelledby="cta-heading">
        <h2 id="cta-heading" class="cta-card__title">Redo att öva?</h2>
        <p class="cta-card__lead">
          <span class="cta-card__accent" id="cta-due-num">0</span>
          <span class="cta-card__lead-text"> kort väntar på repetition</span>
        </p>
        <p class="cta-card__sub">Fortsätt med korten nedan.</p>
      </article>
      <div class="stat-pills" id="stats" aria-live="polite">
        <div class="stat-pill">
          <span class="stat-pill__label">Totalt</span>
          <span class="stat-pill__value" id="stat-total">0</span>
        </div>
        <div class="stat-pill stat-pill--accent">
          <span class="stat-pill__label">Nu</span>
          <span class="stat-pill__value" id="stat-due">0</span>
        </div>
      </div>
    </section>

    <main class="study" id="study" hidden>
      <div class="study__progress" aria-hidden="true"><div class="study__progress-bar" id="study-progress-bar"></div></div>
      <article class="flashcard" aria-live="polite">
        <p class="flashcard__meta" id="card-chapter"></p>
        <p class="flashcard__task" id="card-task"></p>
        <p class="flashcard__prompt" id="card-prompt"></p>
        <p class="flashcard__hint" id="card-hint" hidden></p>
        <div id="exercise-zone" class="exercise-zone"></div>
        <div class="card-feedback" id="card-feedback" hidden>
          <p class="card-feedback__text" id="card-feedback-text"></p>
          <button type="button" id="btn-continue" class="btn btn--primary">Fortsätt</button>
        </div>
      </article>
    </main>

    <section class="empty-state panel" id="empty-state">
      <p id="empty-message">Laddar övningar…</p>
    </section>

    <div class="celebration-layer" id="celebration-layer" aria-live="assertive" aria-hidden="true">
      <div class="celebration-layer__burst" aria-hidden="true">
        <span class="celebration-layer__spark"></span>
        <span class="celebration-layer__spark"></span>
        <span class="celebration-layer__spark"></span>
        <span class="celebration-layer__spark"></span>
        <span class="celebration-layer__spark"></span>
        <span class="celebration-layer__spark"></span>
      </div>
      <div class="celebration-layer__card">
        <p class="celebration-layer__kicker">Boom!</p>
        <p class="celebration-layer__title">Fem uppgifter klara</p>
        <p class="celebration-layer__subtitle">+5 poäng</p>
      </div>
    </div>
  </div>

  <script src="exercises/registry.js"></script>
  <script src="exercises/mc.js"></script>
  <script src="exercises/assemble.js"></script>
  <script src="exercises/pairs.js"></script>
  <script src="app.js"></script>
</body>
</html>
