<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Spanska – repetition</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="top-bar">
      <div class="top-bar__left">
        <span class="top-bar__mark" aria-hidden="true">ES</span>
        <div class="top-bar__titles">
          <p class="top-bar__hello">¡Hola!</p>
          <p class="top-bar__tagline">Spansk repetition</p>
        </div>
      </div>
      <div class="top-bar__badge" id="header-due-badge" title="Kort att repetera nu" aria-live="polite">0</div>
    </header>

    <section class="dashboard" id="dashboard-zone" hidden>
      <article class="cta-card" aria-labelledby="cta-heading">
        <h2 id="cta-heading" class="cta-card__title">Redo att öva?</h2>
        <p class="cta-card__lead">
          <span class="cta-card__accent" id="cta-due-num">0</span>
          <span class="cta-card__lead-text"> kort väntar på repetition</span>
        </p>
        <p class="cta-card__sub">Fortsätt med korten nedan.</p>
      </article>
      <div class="stat-pills" id="stats" aria-live="polite">
        <div class="stat-pill">
          <span class="stat-pill__label">Totalt</span>
          <span class="stat-pill__value" id="stat-total">0</span>
        </div>
        <div class="stat-pill stat-pill--accent">
          <span class="stat-pill__label">Nu</span>
          <span class="stat-pill__value" id="stat-due">0</span>
        </div>
      </div>
    </section>

    <main class="study" id="study" hidden>
      <div class="study__progress" aria-hidden="true"><div class="study__progress-bar" id="study-progress-bar"></div></div>
      <article class="flashcard" aria-live="polite">
        <p class="flashcard__meta" id="card-chapter"></p>
        <p class="flashcard__prompt" id="card-front"></p>
        <p class="flashcard__hint" id="card-hint" hidden></p>
        <button type="button" id="btn-reveal" class="btn btn--primary">Visa svar</button>
        <div class="flashcard__answer" id="card-back-wrap" hidden>
          <p class="flashcard__answer-text" id="card-back"></p>
          <div class="grade-row" role="group" aria-label="Kunde du svaret?">
            <button type="button" class="btn btn--knew" data-grade="knew">Jag kunde den</button>
            <button type="button" class="btn btn--miss" data-grade="miss">Jag kunde inte den</button>
          </div>
        </div>
      </article>
    </main>

    <section class="empty-state panel" id="empty-state">
      <p id="empty-message">Laddar övningar…</p>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
